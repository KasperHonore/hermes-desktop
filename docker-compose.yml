services:
  desktop:
    image: ghcr.io/kasperhonore/hermes-desktop:latest
    container_name: hermes-desktop
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HERMES_DESKTOP_REMOTE_URL=${HERMES_DESKTOP_REMOTE_URL}
      - HERMES_DESKTOP_REMOTE_TOKEN=${HERMES_DESKTOP_REMOTE_TOKEN}
      - HERMES_DESKTOP_DISABLE_GPU=1
      - TITLE=Hermes Desktop
      - NO_DECOR=true
    shm_size: "1g"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=true
    command: hermes-desktop
