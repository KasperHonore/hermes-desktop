name: Build Hermes Desktop Image

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone hermes-agent
        run: git clone --depth 1 https://github.com/NousResearch/hermes-agent.git

      - name: Get hermes-agent commit SHA
        id: hermes
        run: echo "sha=$(git -C hermes-agent rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            HERMES_SHA=${{ steps.hermes.outputs.sha }}
          tags: |
            ghcr.io/kasperhonore/hermes-desktop:latest
            ghcr.io/kasperhonore/hermes-desktop:${{ steps.hermes.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
